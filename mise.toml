min_version = "2024.9.5"

[env]
_.path = ["{{config_root}}/tools/bin"]

[tools]
"npm:@bazel/bazelisk" = "1.28.1"
bun = "1.3.13"

[tasks.fetch]
description = "Fetch Bazel external dependencies for the organization graph"
run = "bazel fetch //:org"

[tasks.submodule-status]
description = "Verify submodules are initialized and expose Bazel metadata"
run = "bazel test //:submodule_status"

[tasks.native-gates]
description = "Run every child repository's native gate through Bazel"
run = "bazel test //:native_gates"

[tasks.org]
description = "Run the full SwiftTUI organization validation target"
run = "bazel test //:org"
