min_version = "2024.9.5"

[env]
_.path = ["{{config_root}}/tools/bin"]

[tools]
"npm:@bazel/bazelisk" = "1.28.1"
bun = "1.3.13"

[tasks.fetch]
description = "Fetch Bazel external dependencies for the organization graph"
run = "bazel fetch //:org_full"

[tasks.submodule-status]
description = "Verify submodules are initialized and expose Bazel metadata"
run = "bazel test //:submodule_status"

[tasks.generate]
description = "Regenerate org-registry files from tools/registry/repos.json (root MODULE.bazel/BUILD.bazel, README table, repos.generated.sh) after editing the manifest. CI verifies they are current via //:repo_registry_contract (mise run org-fast)."
run = "python3 tools/registry/generate.py --write"

[tasks.org-fast]
description = "Run the cheap organization contract checks"
run = "bazel test //:org_fast"

[tasks.native-gates]
description = "Run every child repository's native gate through Bazel"
run = "bazel test //:native_gates"

[tasks.org-full]
description = "Run the full organization validation target"
run = "bazel test //:org_full"

[tasks.release-candidate]
description = "Run the release candidate organization validation target"
run = "bazel test //:release_candidate"

[tasks.org]
description = "Run the compatibility alias for the full SwiftTUI organization target"
run = "bazel test //:org"

[tasks.bump]
description = "Preview an org-wide version bump (dry run). Append --write to apply. Usage: mise run bump -- <new-version> [--write]"
run = "tools/coordination/bump_version.sh"

[tasks.overlay]
description = "Materialize the coordination overlay (forwards args after `--` to open_overlay)"
run = "bazel run //:open_overlay --"

[tasks.worktree-gates]
description = "Run both pretag gates against the live working tree (worktree mode)"
run = "bazel test //:worktree_gates"

[tasks.overlay-smoke]
description = "Cheap script-level regression check for the overlay tooling"
run = "bazel test //:open_overlay_smoke"

[tasks.layout-diff]
description = "SwiftUI-vs-SwiftTUI layout-comparison sweep: render every gallery comparison in both engines headless, then emit the geometry/IoU report + the side-by-side pixel contact sheet. Needs swiftly + macOS/AppKit + ImageMagick. See tools/layout-diff/README.md."
run = "tools/layout-diff/run.sh"
