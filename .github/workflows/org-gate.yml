name: Org Gate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      full_gate:
        description: Run the full child native gates from the org checkout
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: org-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.13"
  SWIFTLY_VERSION: "1.1.1"

jobs:
  org-gate:
    name: Org repo gate
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout organization workspace
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.SWIFTTUI_CI_TOKEN || github.token }}
          submodules: recursive
          fetch-depth: 0

      - name: Setup Bazelisk
        shell: bash
        run: |
          set -euo pipefail
          npm install --prefix "$RUNNER_TEMP/bazelisk" @bazel/bazelisk@1.28.1
          echo "$RUNNER_TEMP/bazelisk/node_modules/.bin" >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/tools/bin" >> "$GITHUB_PATH"
          PATH="$RUNNER_TEMP/bazelisk/node_modules/.bin:$GITHUB_WORKSPACE/tools/bin:$PATH" \
            "$GITHUB_WORKSPACE/tools/bin/bazel" version

      - name: Run organization contract
        shell: bash
        run: bazel test //:org_fast

  full-org-gate:
    name: Full organization gate
    runs-on: macos-26
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_gate }}
    timeout-minutes: 150

    steps:
      - name: Checkout organization workspace
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.SWIFTTUI_CI_TOKEN || github.token }}
          submodules: recursive
          fetch-depth: 0

      - name: Setup Bazelisk
        shell: bash
        run: |
          set -euo pipefail
          npm install --prefix "$RUNNER_TEMP/bazelisk" @bazel/bazelisk@1.28.1
          echo "$RUNNER_TEMP/bazelisk/node_modules/.bin" >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/tools/bin" >> "$GITHUB_PATH"
          PATH="$RUNNER_TEMP/bazelisk/node_modules/.bin:$GITHUB_WORKSPACE/tools/bin:$PATH" \
            "$GITHUB_WORKSPACE/tools/bin/bazel" version

      - name: Install native gate dependencies
        shell: bash
        run: |
          set -euo pipefail
          brew install binaryen brotli ripgrep

      - name: Install swiftly and Swift toolchain
        shell: bash
        working-directory: swift-tui
        run: |
          set -euo pipefail
          curl -fsSLO https://download.swift.org/swiftly/darwin/swiftly.pkg
          installer -pkg swiftly.pkg -target CurrentUserHomeDirectory
          ~/.swiftly/bin/swiftly init --skip-install --quiet-shell-followup --assume-yes
          . "${SWIFTLY_HOME_DIR:-$HOME/.swiftly}/env.sh"
          hash -r
          swift_version="$(tr -d '[:space:]' < "$GITHUB_WORKSPACE/swift-tui/.swift-version")"
          swiftly install --use --assume-yes "$swift_version"
          swiftly run swift --version
          echo "$HOME/.swiftly/bin" >> "$GITHUB_PATH"
          echo "SWIFTLY_HOME_DIR=$HOME/.swiftly" >> "$GITHUB_ENV"

      - name: Install wasm Swift SDK
        shell: bash
        working-directory: swift-tui
        run: |
          set -euo pipefail
          if ! swiftly run swift sdk list | grep -q "swift-6.3.1-RELEASE_wasm"; then
            swiftly run swift sdk install \
              https://download.swift.org/swift-6.3.1-release/wasm-sdk/swift-6.3.1-RELEASE/swift-6.3.1-RELEASE_wasm.artifactbundle.tar.gz \
              --checksum bd47baa20771f366d8beed7970afaa30742b2210097afd15f85427226d8f4cf2
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Fetch Bazel graph
        shell: bash
        run: bazel fetch //:org_full

      - name: Run full organization gate
        shell: bash
        run: bazel test //:org_full
