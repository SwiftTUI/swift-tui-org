name: org-gate

# Remote CI for the coordination root. Until now org integrity rested entirely
# on an operator running Bazel locally (the root had no remote CI), and the
# child-repo Linux gate deliberately never cross-compiles wasm32-wasi or Android —
# so a target-only break shipped green and only surfaced post-tag (hit at 0.0.19
# and again at 0.0.26 via EnvFrameTraceSink). This workflow closes those gaps:
#   1. org-contract        — the cheap Bazel org contract checks (`mise run org-fast`).
#   2. wasi-cross-compile  — type-checks the pinned framework for wasm32-wasi.
#   3. android-cross-compile — type-checks the framework + SwiftTUIAndroidHost for Android.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A new push to the same ref cancels the previous in-flight run.
concurrency:
  group: org-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  org-contract:
    name: org-fast (Bazel contract checks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # mise.toml pins Bazelisk + Bun (the only tools the contract checks need;
      # Swift/Xcode are intentionally not installed by mise).
      - uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Run org-fast
        run: mise run org-fast

  wasi-cross-compile:
    name: wasm32-wasi cross-compile (framework)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Swift is provisioned via swiftly (matching the project convention), not
      # mise. The toolchain version tracks the framework's pinned .swift-version.
      # The value is validated against a strict pattern before any downstream use
      # so an attacker-controlled .swift-version (e.g. on a fork PR) cannot inject
      # shell into the steps below; it is then passed via env, never interpolated
      # directly into a run script.
      - name: Resolve pinned Swift version
        id: swift
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < swift-tui/.swift-version)"
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+(\.[0-9]+)?$'; then
            echo "::error::Unexpected swift-tui/.swift-version contents: '$version'"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Linux Swift dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Install swiftly + toolchain
        env:
          SWIFT_VERSION: ${{ steps.swift.outputs.version }}
        run: |
          set -euo pipefail
          curl -fsSL "https://download.swift.org/swiftly/linux/swiftly-$(uname -m).tar.gz" \
            | tar zxf - -C /tmp
          /tmp/swiftly init --quiet-shell-followup --assume-yes --skip-install
          . "$HOME/.local/share/swiftly/env.sh"
          swiftly install --use "$SWIFT_VERSION"
          echo "$HOME/.local/share/swiftly/bin" >> "$GITHUB_PATH"

      - name: Install the wasm32-wasi Swift SDK
        env:
          SWIFT_VERSION: ${{ steps.swift.outputs.version }}
        run: |
          set -euo pipefail
          . "$HOME/.local/share/swiftly/env.sh"
          case "$SWIFT_VERSION" in
            6.3.1)
              WASM_SDK_CHECKSUM="bd47baa20771f366d8beed7970afaa30742b2210097afd15f85427226d8f4cf2"
              ;;
            *)
              echo "::error::No pinned wasm SDK checksum for Swift ${SWIFT_VERSION}"
              exit 1
              ;;
          esac
          swift sdk install \
            "https://download.swift.org/swift-${SWIFT_VERSION}-release/wasm-sdk/swift-${SWIFT_VERSION}-RELEASE/swift-${SWIFT_VERSION}-RELEASE_wasm.artifactbundle.tar.gz" \
            --checksum "$WASM_SDK_CHECKSUM"
          swift sdk list

      # The WASI surface lives behind `#if canImport(WASILibc)`, so it is only
      # type-checked when actually cross-compiling. SwiftTUIRuntime transitively
      # builds SwiftTUICore + SwiftTUIViews, covering the whole library surface.
      - name: Cross-compile SwiftTUIRuntime for wasm32-wasi
        working-directory: swift-tui
        env:
          SWIFT_VERSION: ${{ steps.swift.outputs.version }}
        run: |
          set -euo pipefail
          . "$HOME/.local/share/swiftly/env.sh"
          swift build \
            --swift-sdk "swift-${SWIFT_VERSION}-RELEASE_wasm" \
            --target SwiftTUIRuntime

  android-cross-compile:
    name: Android cross-compile (framework + host)
    runs-on: ubuntu-latest
    # The Android Swift SDK is published on its own cadence by the Android
    # workgroup, NOT at every toolchain patch level — there is no 6.3.1 Android
    # SDK, so it is pinned here separately from the toolchain (URL + SHA256 from
    # swift.org's getting-started guide). The pinned 6.3.1 toolchain + 6.3.2
    # Android SDK pairing is the verified-working combination; bump
    # ANDROID_SDK_VERSION/CHECKSUM when a matching SDK ships for a newer toolchain.
    env:
      ANDROID_SDK_VERSION: "6.3.2"
      ANDROID_SDK_CHECKSUM: "939e933549d12d28f2e0bf71019d734d309859e9773c572657ce565a81f85d68"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Toolchain via swiftly, tracking the framework's pinned .swift-version
      # (validated against a strict pattern so a fork PR cannot inject shell
      # through it), exactly like the wasm job above.
      - name: Resolve pinned Swift version
        id: swift
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < swift-tui/.swift-version)"
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+(\.[0-9]+)?$'; then
            echo "::error::Unexpected swift-tui/.swift-version contents: '$version'"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Linux Swift dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Install swiftly + toolchain
        env:
          SWIFT_VERSION: ${{ steps.swift.outputs.version }}
        run: |
          set -euo pipefail
          curl -fsSL "https://download.swift.org/swiftly/linux/swiftly-$(uname -m).tar.gz" \
            | tar zxf - -C /tmp
          /tmp/swiftly init --quiet-shell-followup --assume-yes --skip-install
          . "$HOME/.local/share/swiftly/env.sh"
          swiftly install --use "$SWIFT_VERSION"
          echo "$HOME/.local/share/swiftly/bin" >> "$GITHUB_PATH"

      - name: Install the Android Swift SDK
        run: |
          set -euo pipefail
          . "$HOME/.local/share/swiftly/env.sh"
          swift sdk install \
            "https://download.swift.org/swift-${ANDROID_SDK_VERSION}-release/android-sdk/swift-${ANDROID_SDK_VERSION}-RELEASE/swift-${ANDROID_SDK_VERSION}-RELEASE_android.artifactbundle.tar.gz" \
            --checksum "$ANDROID_SDK_CHECKSUM"
          swift sdk list

      # SwiftTUIAndroidHost depends on SwiftTUIRuntime (which builds SwiftTUICore
      # + SwiftTUIViews), so this covers the whole library surface plus the
      # Android host's `#if os(Android)` code that the Linux gate never compiles.
      - name: Cross-compile SwiftTUIAndroidHost for Android
        working-directory: swift-tui
        run: |
          set -euo pipefail
          . "$HOME/.local/share/swiftly/env.sh"
          swift build \
            --swift-sdk "swift-${ANDROID_SDK_VERSION}-RELEASE_android" \
            --target SwiftTUIAndroidHost
